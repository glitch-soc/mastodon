name: 'Setup RUby'
description: 'Setup a Ruby environment ready to run the Mastodon code'
inputs:
  ruby-version:
    description: The Ruby version to install
    default: '.ruby-version'
  additional-system-dependencies:
    description: 'Additional packages to install'
  gamepatch-token:
    description: 'Fine-grained PAT with read access to DROG-group/tactcheck (private submodule).'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libicu-dev libidn11-dev libvips42 ${{ inputs.additional-system-dependencies }}

    # The gamepatch engine lives in a private submodule. Its Gemfile entry is
    # conditional on the directory existing, so bundler resolution (run by
    # setup-ruby below with bundler-cache: true) needs the submodule
    # materialized first or it sees gamepatch as "deleted" vs the lockfile
    # and refuses to reconcile under frozen mode.
    #
    # Token rewrite scopes auth to github.com clones for the duration of the
    # job. Skips the step gracefully if no token is provided — the workflow
    # then fails at bundle install with a clear "deleted from Gemfile"
    # message, which beats silently running against a stale lockfile.
    - name: Initialize gamepatch submodule
      shell: bash
      env:
        GAMEPATCH_TOKEN: ${{ inputs.gamepatch-token }}
      run: |
        if [ -z "$GAMEPATCH_TOKEN" ]; then
          echo "::warning::gamepatch-token input not set — submodule clone will fail. Pass secrets.GAMEPATCH_DEPLOY_TOKEN from the calling workflow."
        fi
        git config --global url."https://x-access-token:${GAMEPATCH_TOKEN}@github.com/".insteadOf "https://github.com/"
        git submodule update --init --recursive gamepatch

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler-cache: true
