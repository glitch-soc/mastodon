name: 'Setup RUby'
description: 'Setup a Ruby environment ready to run the Mastodon code'
inputs:
  ruby-version:
    description: The Ruby version to install
    default: '.ruby-version'
  additional-system-dependencies:
    description: 'Additional packages to install'

runs:
  using: 'composite'
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libicu-dev libidn11-dev libvips42 ${{ inputs.additional-system-dependencies }}

    # The gamepatch engine lives in a submodule. Its Gemfile entry is
    # conditional on the directory existing, so bundler resolution
    # (run by setup-ruby below with bundler-cache: true) needs the
    # submodule materialized first or it sees gamepatch as "deleted"
    # vs the lockfile and refuses to reconcile under frozen mode.
    - name: Initialize gamepatch submodule
      shell: bash
      run: git submodule update --init --recursive gamepatch

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler-cache: true
