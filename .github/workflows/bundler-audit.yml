name: Bundler Audit
on:
  merge_group:
  push:
    branches:
      - 'main'
      - 'stable-*'
    paths:
      - 'Gemfile*'
      - '.ruby-version'
      - '.github/workflows/bundler-audit.yml'

  pull_request:
    paths:
      - 'Gemfile*'
      - '.ruby-version'
      - '.github/workflows/bundler-audit.yml'

  schedule:
    - cron: '0 5 * * 1'

jobs:
  security:
    runs-on: ubuntu-latest

    env:
      BUNDLE_ONLY: development

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Initialize gamepatch submodule
        env:
          GAMEPATCH_TOKEN: ${{ secrets.GAMEPATCH_DEPLOY_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GAMEPATCH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive gamepatch

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run bundler-audit
        run: bin/bundler-audit check --update
